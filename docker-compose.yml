version: '3.9'

services:

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  order-api:
    build:
      context: ./OrderService
    ports:
      - "5001:8080"
    depends_on:
      - rabbitmq

  notification-api:
    build:
      context: ./NotificationService
    ports:
      - "5002:8080"
    depends_on:
      - rabbitmq

  gateway-api:
    build:
      context: ./GatewayApi
    ports:
      - "5003:8080"
    depends_on:
      - order-api
      - notification-api